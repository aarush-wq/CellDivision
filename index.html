<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Cell Divison Animation By- Aarush Maharana</title>

<style>
  :root {
    --bg: #f9fafb;
    --text-main: #111827;
    --text-muted: #6b7280;
    --accent: #2563eb;
    --accent-dark: #1d4ed8;
    --border: #e5e7eb;
    --spindle: #eab308;
  }

  body, html {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden; /* Hide scrollbars, making it feel like an app */
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background-color: white;
    color: var(--text-main);
  }

  /* Core container that fills the entire viewport */
  .main-viewport {
    width: 100vw;
    height: 100vh;
    display: flex;
    flex-direction: column;
    position: relative;
    box-sizing: border-box;
  }

  /* Minimal Top Header - Absolute positioned so it floats over artboard */
  .header-float {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 30px;
    box-sizing: border-box;
    z-index: 100; /* Ensure it stays on top */
  }
  
  .project-title {
    font-size: 20px;
    font-weight: 700;
    margin: 0;
    letter-spacing: -0.5px;
  }

  .toggle-btn {
    background-color: rgba(255, 255, 255, 0.8); /* Semi-transparent background */
    border: 1px solid var(--border);
    color: #374151;
    padding: 10px 18px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    border-radius: 6px;
    transition: all 0.2s ease;
    backdrop-filter: blur(5px); /* Add blur effect to background behind button */
  }
  .toggle-btn:hover {
    background-color: var(--border);
  }

  /* Full Screen SVG Artboard Viewport */
  .artboard {
    flex: 1; /* Take all available space in the column */
    background-color: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }
  
  #cellSvg {
    width: auto;
    height: 85%; /* Scaled up to fill more height naturally */
    max-width: 95%; /* scaled to fill more width naturally */
  }

  /* Full Screen CSS Animation Logic */
  circle, ellipse, line, g {
    transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
  }

  /* Simplified Info Caption - Absolute positioned so it floats at bottom */
  .info-float {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    text-align: center;
    padding: 20px 30px;
    padding-bottom: 30px;
    box-sizing: border-box;
    z-index: 100;
  }
  
  .step-heading {
    color: var(--accent);
    margin: 0 0 4px 0;
    font-size: 24px;
    font-weight: 700;
  }
  
  .step-paragraph {
    color: var(--text-muted);
    font-size: 16px;
    line-height: 1.5;
    margin: 0;
    max-width: 650px;
    margin: 0 auto;
  }

  /* Keyboard Tip Guide, position near caption but distinct */
  .keyboard-tip {
    margin-top: 15px;
    font-size: 12px;
    color: #9ca3af;
    letter-spacing: 0.5px;
  }
</style>
</head>
<body>

<div class="main-viewport">
  <div class="header-float">
    <div class="project-title" id="modeTitle">Mitosis (Body Cells)</div>
    <button class="toggle-btn" id="modeToggleClick">Switch to Meiosis</button>
  </div>

  <div class="artboard">
    <svg id="cellSvg" viewBox="0 0 600 420" xmlns="http://www.w3.org/2000/svg">
      <g id="parentGroup">
        <circle id="parentMembrane" cx="300" cy="220" r="100" fill="#eff6ff" stroke="#2563eb" stroke-width="4"></circle>
        <circle id="parentNucleus" cx="300" cy="220" r="45" fill="#dbeafe" stroke="#1d4ed8" stroke-width="2"></circle>
        <g id="parentChromos" opacity="0"></g>
      </g>

      <g id="divideGroup" opacity="0">
        <ellipse id="divideMembrane" cx="300" cy="220" rx="160" ry="100" fill="#eff6ff" stroke="#2563eb" stroke-width="4"></ellipse>
        <g id="spindleLines" stroke="#eab308" stroke-width="1.5" opacity="0.4"></g>
        <line id="equatorLine" x1="300" y1="120" x2="300" y2="320" stroke="#eab308" stroke-width="2" stroke-dasharray="5 5" opacity="0"></line>
        <g id="movingChromos"></g>
      </g>

      <g id="daughterGroup" opacity="0">
        <g id="daughterLeft">
          <circle id="dLeftMembrane" cx="220" cy="220" r="85" fill="#eff6ff" stroke="#2563eb" stroke-width="4"></circle>
          <circle id="dLeftNucleus" cx="220" cy="220" r="40" fill="#dbeafe" stroke="#1d4ed8" stroke-width="2"></circle>
          <g id="leftChromos"></g>
        </g>
        <g id="daughterRight">
          <circle id="dRightMembrane" cx="380" cy="220" r="85" fill="#eff6ff" stroke="#2563eb" stroke-width="4"></circle>
          <circle id="dRightNucleus" cx="380" cy="220" r="40" fill="#dbeafe" stroke="#1d4ed8" stroke-width="2"></circle>
          <g id="rightChromos"></g>
        </g>
      </g>

      <g id="quadGroup" opacity="0">
        <g transform="translate(195, 145)"><circle cx="0" cy="0" r="58" fill="#eff6ff" stroke="#2563eb" stroke-width="3"></circle><circle cx="0" cy="0" r="24" fill="#dbeafe" stroke="#1d4ed8" stroke-width="1.5"></circle><g id="quad1"></g></g>
        <g transform="translate(195, 295)"><circle cx="0" cy="0" r="58" fill="#eff6ff" stroke="#2563eb" stroke-width="3"></circle><circle cx="0" cy="0" r="24" fill="#dbeafe" stroke="#1d4ed8" stroke-width="1.5"></circle><g id="quad2"></g></g>
        <g transform="translate(405, 145)"><circle cx="0" cy="0" r="58" fill="#eff6ff" stroke="#2563eb" stroke-width="3"></circle><circle cx="0" cy="0" r="24" fill="#dbeafe" stroke="#1d4ed8" stroke-width="1.5"></circle><g id="quad3"></g></g>
        <g transform="translate(405, 295)"><circle cx="0" cy="0" r="58" fill="#eff6ff" stroke="#2563eb" stroke-width="3"></circle><circle cx="0" cy="0" r="24" fill="#dbeafe" stroke="#1d4ed8" stroke-width="1.5"></circle><g id="quad4"></g></g>
      </g>
    </svg>
  </div>

  <div class="info-float">
    <h2 class="step-heading" id="stepHeading">Loading...</h2>
    <p class="step-paragraph" id="stepParagraph">Loading steps...</p>
    <div class="keyboard-tip">Navigate with the <b>← Left Arrow</b> and <b>→ Right Arrow</b> keys</div>
  </div>

</div>

<script>
(function(){
  // Main, simplified text lines used across all division types
  const mitosisSteps = [
    { title: "1. Normal Resting Stage", desc: "The cell is growing and doing its normal everyday job. The DNA copy is loose and hidden safely inside the nucleus." },
    { title: "2. Copying the DNA", desc: "Before dividing, the cell makes a perfect copy of all its DNA so that both new cells will have a complete set." },
    { title: "3. Chromosomes Condense", desc: "The loose DNA packs tightly into X-shaped structures called chromosomes. You can now clearly see them inside the nucleus." },
    { title: "4. Equator Alignment", desc: "The nucleus wall melts away. The chromosomes line up perfectly in a single-file line right down the center of the cell." },
    { title: "5. Pulling Apart", desc: "The X-shaped chromosomes are snapped in half. Strong cell fibers pull the pieces away to opposite sides of the cell." },
    { title: "6. Pinching the Cell", desc: "The middle of the cell begins to pinch inward, separating the floating pieces and preparing to split down the center." },
    { title: "7. Two Twin Cells", desc: "The split is complete! We now have two separate cells. They are identical twins with the exact same DNA as the parent cell." }
  ];

  const meiosisSteps = [
    { title: "1. Resting Stage", desc: "A special cell prepares to divide to make reproductive cells. It copies its DNA just like in mitosis." },
    { title: "2. DNA Physical Trade (Crossover)", desc: "Similar chromosomes pair up side-by-side and trade random pieces with each other. This creates a totally unique mix of traits!" },
    { title: "3. Lining Up in Double Rows", desc: "Instead of a single line, the paired homologous chromosomes line up in two rows down the middle of the cell." },
    { title: "4. First Big Separation Pull", desc: "Whole chromosome pairs are pulled apart to opposite ends of the cell, but the individual chromatid arms stay stuck together." },
    { title: "5. Temporary Split (Meiosis I)", desc: "The cell pinches in half. We now have two temporary cells, each holding half the amount of original pairs." },
    { title: "6. Secondary Arm Breakout", desc: "Inside both intermediate cells, the chromosomes line up again. This time, individual sister arms are snapped and pulled apart." },
    { title: "7. Four Unique Gametes Complete", desc: "The cells split once more, creating four final cells. Each possesses a completely unique mix of DNA with half the normal genetic material." }
  ];

  let currentMode = 'mitosis';
  let currentStepsList = mitosisSteps;
  let activeIndex = 0;

  const svgNS = "http://www.w3.org/2000/svg";

  // Elements mapping
  const modeTitle = document.getElementById('modeTitle');
  const modeToggleClick = document.getElementById('modeToggleClick');
  const stepHeading = document.getElementById('stepHeading');
  const stepParagraph = document.getElementById('stepParagraph');

  const parentGroup = document.getElementById('parentGroup');
  const parentMembrane = document.getElementById('parentMembrane');
  const parentNucleus = document.getElementById('parentNucleus');
  const parentChromos = document.getElementById('parentChromos');
  const divideGroup = document.getElementById('divideGroup');
  const divideMembrane = document.getElementById('divideMembrane');
  const spindleLines = document.getElementById('spindleLines');
  const equatorLine = document.getElementById('equatorLine');
  const movingChromos = document.getElementById('movingChromos');
  const daughterGroup = document.getElementById('daughterGroup');
  const leftChromos = document.getElementById('leftChromos');
  const rightChromos = document.getElementById('rightChromos');
  const quadGroup = document.getElementById('quadGroup');

  function buildXChromosome(x, y, mainColor, darkColor, scale=1.3, rotate=0, crossedOver=false) {
    const group = document.createElementNS(svgNS, "g");
    group.setAttribute("transform", `translate(${x},${y}) rotate(${rotate}) scale(${scale})`);
    
    // Cross over indicator color mutation logic
    const crossoverColor = "#a855f7"; // purple indicator

    const armLeft = document.createElementNS(svgNS, "line");
    armLeft.setAttribute("x1", "-6"); armLeft.setAttribute("y1", "-10");
    armLeft.setAttribute("x2", "6"); armLeft.setAttribute("y2", "10");
    armLeft.setAttribute("stroke", crossedOver ? crossoverColor : darkColor);
    armLeft.setAttribute("stroke-width", "4.5"); armLeft.setAttribute("stroke-linecap", "round");
    
    const armRight = document.createElementNS(svgNS, "line");
    armRight.setAttribute("x1", "6"); armRight.setAttribute("y1", "-10");
    armRight.setAttribute("x2", "-6"); armRight.setAttribute("y2", "10");
    armRight.setAttribute("stroke", darkColor);
    armRight.setAttribute("stroke-width", "4.5"); armRight.setAttribute("stroke-linecap", "round");

    const centromere = document.createElementNS(svgNS, "circle");
    centromere.setAttribute("cx", "0"); centromere.setAttribute("cy", "0"); centromere.setAttribute("r", "4.5");
    centromere.setAttribute("fill", mainColor);

    group.appendChild(armLeft); group.appendChild(armRight); group.appendChild(centromere);
    return group;
  }

  function buildSingleChromatidstrand(x, y, color, rotate=0, isCrossoverSegment=false) {
    const group = document.createElementNS(svgNS, "g");
    group.setAttribute("transform", `translate(${x},${y}) rotate(${rotate})`);
    
    const crossoverIndicator = "#a855f7"; // Purple crossover segment

    const strand = document.createElementNS(svgNS, "line");
    strand.setAttribute("x1", "-5"); strand.setAttribute("y1", "-11");
    strand.setAttribute("x2", "5"); strand.setAttribute("y2", "11");
    strand.setAttribute("stroke", isCrossoverSegment ? crossoverIndicator : color);
    strand.setAttribute("stroke-width", "4.5"); strand.setAttribute("stroke-linecap", "round");
    group.appendChild(strand);
    return group;
  }

  function updateStageGraphics() {
    // Sync captions text engine
    stepHeading.textContent = currentStepsList[activeIndex].title;
    stepParagraph.textContent = currentStepsList[activeIndex].desc;

    // Reset layout visibility properties smooth animation context
    parentGroup.style.opacity = 0;
    divideGroup.style.opacity = 0;
    daughterGroup.style.opacity = 0;
    quadGroup.style.opacity = 0;
    
    parentChromos.innerHTML = '';
    movingChromos.innerHTML = '';
    spindleLines.innerHTML = '';
    leftChromos.innerHTML = '';
    rightChromos.innerHTML = '';
    
    document.getElementById('quad1').innerHTML = '';
    document.getElementById('quad2').innerHTML = '';
    document.getElementById('quad3').innerHTML = '';
    document.getElementById('quad4').innerHTML = '';

    // Standard scaling factors for full screen scale logic
    parentMembrane.setAttribute('r', 100);
    parentNucleus.setAttribute('r', 45);
    divideMembrane.setAttribute('rx', 160);
    divideMembrane.setAttribute('ry', 100);
    equatorLine.style.opacity = 0;

    if (currentMode === 'mitosis') {
      executeMitosisRender();
    } else {
      executeMeiosisRender();
    }
  }

  function executeMitosisRender() {
    if (activeIndex <= 2) {
      parentGroup.style.opacity = 1;
      if (activeIndex === 1) {
        // Growth pulse animation
        parentMembrane.setAttribute('r', 115);
        parentNucleus.setAttribute('r', 52);
      }
      if (activeIndex === 2) {
        // Pop chromosomes context inside nucleus wrapper
        parentChromos.appendChild(buildXChromosome(280, 205, "#f87171", "#dc2626", 1.3, 20));
        parentChromos.appendChild(buildXChromosome(320, 235, "#60a5fa", "#2563eb", 1.3, -25));
        parentChromos.style.opacity = 1;
      }
    } else if (activeIndex === 3) {
      divideGroup.style.opacity = 1;
      equatorLine.style.opacity = 0.6;
      movingChromos.appendChild(buildXChromosome(300, 175, "#f87171", "#dc2626", 1.3, 90));
      movingChromos.appendChild(buildXChromosome(300, 265, "#60a5fa", "#2563eb", 1.3, 90));
    } else if (activeIndex === 4) {
      divideGroup.style.opacity = 1;
      // Anaphase break context
      movingChromos.appendChild(buildSingleChromatidstrand(190, 175, "#dc2626", -40, false));
      movingChromos.appendChild(buildSingleChromatidstrand(410, 175, "#dc2626", 40, false));
      movingChromos.appendChild(buildSingleChromatidstrand(190, 265, "#2563eb", -40, false));
      movingChromos.appendChild(buildSingleChromatidstrand(410, 265, "#2563eb", 40, false));
    } else if (activeIndex === 5) {
      divideGroup.style.opacity = 1;
      divideMembrane.setAttribute('rx', 105);
      divideMembrane.setAttribute('ry', 95);
      movingChromos.appendChild(buildSingleChromatidstrand(175, 210, "#dc2626", 15, false));
      movingChromos.appendChild(buildSingleChromatidstrand(425, 210, "#dc2626", -15, false));
    } else if (activeIndex === 6) {
      daughterGroup.style.opacity = 1;
      leftChromos.appendChild(buildSingleChromatidstrand(220, 215, "#dc2626", 20, false));
      rightChromos.appendChild(buildSingleChromatidstrand(380, 215, "#2563eb", -20, false));
    }
  }

  function executeMeiosisRender() {
    if (activeIndex === 0) {
      parentGroup.style.opacity = 1;
    } else if (activeIndex === 1) {
      parentGroup.style.opacity = 1;
      // Pairing up with physical crossover indicators physical connection context
      parentChromos.appendChild(buildXChromosome(285, 210, "#f87171", "#dc2626", 1.2, 12, false));
      parentChromos.appendChild(buildXChromosome(315, 220, "#60a5fa", "#2563eb", 1.2, -12, true));
      parentChromos.style.opacity = 1;
    } else if (activeIndex === 2) {
      divideGroup.style.opacity = 1;
      equatorLine.style.opacity = 0.6;
      movingChromos.appendChild(buildXChromosome(275, 220, "#f87171", "#dc2626", 1.2, 90, false));
      movingChromos.appendChild(buildXChromosome(325, 220, "#60a5fa", "#2563eb", 1.2, 90, true));
    } else if (activeIndex === 3) {
      divideGroup.style.opacity = 1;
      movingChromos.appendChild(buildXChromosome(180, 220, "#f87171", "#dc2626", 1.2, 35, false));
      movingChromos.appendChild(buildXChromosome(420, 220, "#60a5fa", "#2563eb", 1.2, -35, true));
    } else if (activeIndex === 4) {
      daughterGroup.style.opacity = 1;
      leftChromos.appendChild(buildXChromosome(220, 220, "#f87171", "#dc2626", 1.1, 20, false));
      rightChromos.appendChild(buildXChromosome(380, 220, "#60a5fa", "#2563eb", 1.1, -20, true));
    } else if (activeIndex === 5) {
      daughterGroup.style.opacity = 1;
      // Meiosis II separation breakout physical action context
      leftChromos.appendChild(buildSingleChromatidstrand(185, 220, "#dc2626", -35, false));
      leftChromos.appendChild(buildSingleChromatidstrand(255, 220, "#c084fc", 35, true));
      rightChromos.appendChild(buildSingleChromatidstrand(345, 220, "#2563eb", -35, false));
      rightChromos.appendChild(buildSingleChromatidstrand(415, 220, "#dc2626", 35, false));
    } else if (activeIndex === 6) {
      quadGroup.style.opacity = 1;
      // Distribute single strands to final micro cell quadrant context
      document.getElementById('quad1').appendChild(buildSingleChromatidstrand(0, 0, "#dc2626", 20, false));
      document.getElementById('quad2').appendChild(buildSingleChromatidstrand(0, 0, "#c084fc", -20, true));
      document.getElementById('quad3').appendChild(buildSingleChromatidstrand(0, 0, "#2563eb", 40, false));
      document.getElementById('quad4').appendChild(buildSingleChromatidstrand(0, 0, "#dc2626", -40, false));
    }
  }

  // Keyboard Event Management Loop
  document.addEventListener('keydown', function(event) {
    if (event.key === 'ArrowRight') {
      if (activeIndex < currentStepsList.length - 1) {
        activeIndex++;
        updateStageGraphics();
      }
    } else if (event.key === 'ArrowLeft') {
      if (activeIndex > 0) {
        activeIndex--;
        updateStageGraphics();
      }
    }
  });

  // Toggle button actions management routing
  modeToggleClick.addEventListener('click', function() {
    if (currentMode === 'mitosis') {
      currentMode = 'meiosis';
      currentStepsList = meiosisSteps;
      modeTitle.textContent = "Meiosis (Sex Cells)";
      modeToggleClick.textContent = "Switch to Mitosis";
    } else {
      currentMode = 'mitosis';
      currentStepsList = mitosisSteps;
      modeTitle.textContent = "Mitosis (Body Cells)";
      modeToggleClick.textContent = "Switch to Meiosis";
    }
    activeIndex = 0;
    updateStageGraphics();
  });

  // Run initial state setup loop context
  updateStageGraphics();
})();
</script>

</body>
</html>
