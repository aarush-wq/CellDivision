<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Cell Division Simulation By- Aarush Maharana</title>
<style>
  :root {
    --bg-color: #f8fafc;
    --text-primary: #0f172a;
    --text-muted: #64748b;
    --accent: #2563eb;
    --border: #e2e8f0;
    
    /* Cell Color Palette */
    --membrane-stroke: #0284c7;
    --membrane-fill: #f0f9ff;
    --nucleus-stroke: #0369a1;
    --nucleus-fill: #e0f2fe;
    --spindle-color: #eab308;
    
    /* Chromosome Palette */
    --ch-red-dark: #dc2626;
    --ch-red-light: #f87171;
    --ch-blue-dark: #2563eb;
    --ch-blue-light: #60a5fa;
    --ch-purple-dark: #7c3aed;
    --ch-purple-light: #a78bfa;
  }

  body, html {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    font-family: system-ui, -apple-system, sans-serif;
    background-color: var(--bg-color);
    color: var(--text-primary);
    -webkit-tap-highlight-color: transparent; /* Removes touch flash on mobile devices */
  }

  .viewport {
    width: 100vw;
    height: 100vh;
    display: flex;
    flex-direction: column;
    position: relative;
  }

  /* Universal Top Progress Line Indicator */
  .progress-bar-container {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 4px;
    background: rgba(0, 0, 0, 0.05);
    z-index: 20;
  }
  
  .progress-bar-fill {
    height: 100%;
    width: 0%;
    background: var(--accent);
    transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  }

  /* Floating UI Overlays */
  .header-ui {
    position: absolute;
    top: 4px;
    left: 0;
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px;
    box-sizing: border-box;
    z-index: 10;
    pointer-events: none;
  }

  @media (min-width: 768px) {
    .header-ui { padding: 24px 32px; }
  }

  .title-text {
    font-size: 16px;
    font-weight: 800;
    letter-spacing: -0.5px;
    pointer-events: auto;
  }

  @media (min-width: 768px) { .title-text { font-size: 22px; } }

  .mode-toggle {
    background-color: rgba(255, 255, 255, 0.85);
    border: 1px solid var(--border);
    padding: 8px 16px;
    font-size: 12px;
    font-weight: 600;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s ease;
    backdrop-filter: blur(8px);
    pointer-events: auto;
    box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
  }

  @media (min-width: 768px) {
    .mode-toggle { padding: 10px 20px; font-size: 14px; }
  }

  .mode-toggle:hover {
    background-color: #fff;
    transform: translateY(-1px);
    box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
  }

  /* Core Canvas Area */
  .canvas-container {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  #simulationSvg {
    width: 100%;
    height: auto;
    max-width: 800px;
    max-height: 55vh;
  }

  @media (min-width: 768px) {
    #simulationSvg { height: 80%; max-height: 85vh; max-width: 95%; }
  }

  /* Ultra-smooth hardware accelerated transitions */
  circle, ellipse, line, path, g {
    transition: all 1.1s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .caption-ui {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    text-align: center;
    padding: 24px;
    box-sizing: border-box;
    z-index: 10;
    background: linear-gradient(transparent, var(--bg-color) 40%);
    pointer-events: none;
  }

  @media (min-width: 768px) { .caption-ui { padding: 32px; } }

  .step-title {
    color: var(--accent);
    font-size: 20px;
    font-weight: 800;
    margin: 0 0 6px 0;
  }

  @media (min-width: 768px) { .step-title { font-size: 26px; } }

  .step-desc {
    color: var(--text-muted);
    font-size: 14px;
    line-height: 1.5;
    max-width: 680px;
    margin: 0 auto;
  }

  @media (min-width: 768px) { .step-desc { font-size: 16px; line-height: 1.6; } }

  .help-tip {
    margin-top: 12px;
    font-size: 11px;
    color: #94a3b8;
    letter-spacing: 0.5px;
    font-weight: 500;
  }

  /* Invisible Left/Right Mobile Touch Triggers */
  .touch-hit-left, .touch-hit-right {
    position: absolute;
    top: 70px;
    bottom: 110px;
    width: 45%;
    z-index: 5;
    cursor: pointer;
  }
  .touch-hit-left { left: 0; }
  .touch-hit-right { right: 0; }
</style>
</head>
<body>

<div class="viewport">
  <div class="progress-bar-container"><div class="progress-bar-fill" id="progressIndicator"></div></div>

  <div class="touch-hit-left" id="tapBack"></div>
  <div class="touch-hit-right" id="tapNext"></div>

  <div class="header-ui">
    <div class="title-text" id="typeDisplay">Mitosis (Body Cells)</div>
    <button class="mode-toggle" id="switchBtn">Switch to Meiosis</button>
  </div>

  <div class="canvas-container">
    <svg id="simulationSvg" viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
      
      <g id="spindles" opacity="0">
        <line x1="150" y1="250" x2="650" y2="250" stroke="var(--spindle)" stroke-width="1.5" stroke-dasharray="4 4" opacity="0.3"></line>
        <path id="fiberL1" d="M 180 250 Q 400 120 620 250" fill="none" stroke="var(--spindle)" stroke-width="1.5" opacity="0.4"/>
        <path id="fiberL2" d="M 180 250 Q 400 380 620 250" fill="none" stroke="var(--spindle)" stroke-width="1.5" opacity="0.4"/>
        <circle cx="180" cy="250" r="4" fill="var(--spindle)"/>
        <circle cx="620" cy="250" r="4" fill="var(--spindle)"/>
      </g>

      <g id="membranes">
        <path id="cellMembrane1" d="M 400,250 m -120,0 a 120,120 0 1,0 240,0 a 120,120 0 1,0 -240,0" fill="var(--membrane-fill)" stroke="var(--membrane-stroke)" stroke-width="4"/>
        <path id="cellMembrane2" d="M 400,250 m -120,0 a 120,120 0 1,0 240,0 a 120,120 0 1,0 -240,0" fill="var(--membrane-fill)" stroke="var(--membrane-stroke)" stroke-width="4" opacity="0"/>
        
        <circle id="membrane3" cx="240" cy="140" r="0" fill="var(--membrane-fill)" stroke="var(--membrane-stroke)" stroke-width="3" opacity="0"/>
        <circle id="membrane4" cx="240" cy="360" r="0" fill="var(--membrane-fill)" stroke="var(--membrane-stroke)" stroke-width="3" opacity="0"/>
        <circle id="membrane5" cx="560" cy="140" r="0" fill="var(--membrane-fill)" stroke="var(--membrane-stroke)" stroke-width="3" opacity="0"/>
        <circle id="membrane6" cx="560" cy="360" r="0" fill="var(--membrane-fill)" stroke="var(--membrane-stroke)" stroke-width="3" opacity="0"/>
      </g>

      <g id="nuclei">
        <circle id="nucleus1" cx="400" cy="250" r="55" fill="var(--nucleus-fill)" stroke="var(--nucleus-stroke)" stroke-width="2"/>
        <circle id="nucleus2" cx="400" cy="250" r="55" fill="var(--nucleus-fill)" stroke="var(--nucleus-stroke)" stroke-width="2" opacity="0"/>
      </g>

      <g id="chromosomes">
        <g id="ch1">
          <line id="ch1_arm1" x1="0" y1="-14" x2="0" y2="14" stroke="var(--ch-red-dark)" stroke-width="5" stroke-linecap="round"/>
          <line id="ch1_arm2" x1="-14" y1="0" x2="14" y2="0" stroke="var(--ch-red-dark)" stroke-width="5" stroke-linecap="round"/>
          <circle cx="0" cy="0" r="5" fill="var(--ch-red-light)"/>
        </g>
        <g id="ch2">
          <line id="ch2_arm1" x1="0" y1="-14" x2="0" y2="14" stroke="var(--ch-blue-dark)" stroke-width="5" stroke-linecap="round"/>
          <line id="ch2_arm2" x1="-14" y1="0" x2="14" y2="0" stroke="var(--ch-blue-dark)" stroke-width="5" stroke-linecap="round"/>
          <circle cx="0" cy="0" r="5" fill="var(--ch-blue-light)"/>
        </g>
        
        <g id="frag1" opacity="0"><line x1="-14" y1="0" x2="14" y2="0" stroke="var(--ch-red-dark)" stroke-width="5" stroke-linecap="round"/><circle cx="0" cy="0" r="5" fill="var(--ch-red-light)"/></g>
        <g id="frag2" opacity="0"><line x1="-14" y1="0" x2="14" y2="0" stroke="var(--ch-blue-dark)" stroke-width="5" stroke-linecap="round"/><circle cx="0" cy="0" r="5" fill="var(--ch-blue-light)"/></g>
        <g id="frag3" opacity="0"><line x1="-14" y1="0" x2="14" y2="0" stroke="var(--ch-purple-dark)" stroke-width="5" stroke-linecap="round"/><circle cx="0" cy="0" r="5" fill="var(--ch-purple-light)"/></g>
        <g id="frag4" opacity="0"><line x1="-14" y1="0" x2="14" y2="0" stroke="var(--ch-red-dark)" stroke-width="5" stroke-linecap="round"/><circle cx="0" cy="0" r="5" fill="var(--ch-red-light)"/></g>
      </g>
    </svg>
  </div>

  <div class="caption-ui">
    <h2 class="step-title"
