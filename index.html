<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cell division animation By- Aarush Maharana</title>
<style>
  :root {
    --bg-color: #0b0f19;
    --text-primary: #f8fafc;
    --text-muted: #94a3b8;
    --accent: #38bdf8;
    --accent-glow: rgba(56, 189, 248, 0.25);
    
    /* Premium Biomorphic Color Palette */
    --membrane-stroke: #0ea5e9;
    --membrane-fill: rgba(14, 165, 233, 0.06);
    --nucleus-stroke: #0284c7;
    --nucleus-fill: rgba(2, 132, 199, 0.15);
    --spindle-color: #f59e0b;
    
    /* Chromosome Core & Glow Dynamics */
    --ch-red: #ef4444;
    --ch-blue: #3b82f6;
    --ch-purple: #a855f7;
  }

  body, html {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background-color: var(--bg-color);
    color: var(--text-primary);
  }

  .viewport {
    width: 100vw;
    height: 100vh;
    display: flex;
    flex-direction: column;
    position: relative;
    background: radial-gradient(circle at center, #111827 0%, #030712 100%);
  }

  /* Cinematic Minimal HUD Overlay */
  .hud-header {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 30px 40px;
    box-sizing: border-box;
    z-index: 10;
    pointer-events: none;
  }

  .hud-title {
    font-size: 20px;
    font-weight: 800;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: #fff;
    text-shadow: 0 0 20px var(--accent-glow);
    pointer-events: auto;
  }

  .hud-toggle {
    background: rgba(15, 23, 42, 0.6);
    border: 1px solid rgba(255, 255, 255, 0.1);
    color: var(--text-primary);
    padding: 12px 24px;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    border-radius: 30px;
    cursor: pointer;
    transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
    backdrop-filter: blur(12px);
    pointer-events: auto;
    box-shadow: 0 4px 30px rgba(0, 0, 0, 0.4);
  }

  .hud-toggle:hover {
    background: var(--text-primary);
    color: var(--bg-color);
    box-shadow: 0 0 25px rgba(255, 255, 255, 0.3);
    transform: scale(1.05);
  }

  /* Viewport Canvas Engine Container */
  .canvas-core {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  #renderEngineSvg {
    width: auto;
    height: 82%;
    max-width: 95%;
    max-height: 85vh;
    filter: drop-shadow(0 0 30px rgba(14, 165, 233, 0.1));
  }

  /* Custom Physics Engine Cubic Bezier Interpolations */
  circle, ellipse, line, path, g {
    transition: all 1.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  /* Chromosome micro-inertia wiggle during shifting sequences */
  .chromosome-node {
    transform-origin: center;
    filter: drop-shadow(0 0 8px currentColor);
  }

  .hud-footer {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    text-align: center;
    padding: 40px;
    box-sizing: border-box;
    z-index: 10;
    background: linear-gradient(transparent, rgba(3, 7, 18, 0.9) 60%);
    pointer-events: none;
  }

  .step-heading {
    color: var(--accent);
    font-size: 28px;
    font-weight: 800;
    margin: 0 0 8px 0;
    letter-spacing: -0.5px;
    text-shadow: 0 0 15px rgba(56, 189, 248, 0.4);
  }

  .step-details {
    color: var(--text-muted);
    font-size: 16px;
    line-height: 1.6;
    max-width: 700px;
    margin: 0 auto;
    font-weight: 400;
  }

  .interaction-tip {
    margin-top: 20px;
    font-size: 11px;
    color: rgba(255, 255, 255, 0.25);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    font-weight: 600;
  }
</style>
</head>
<body>

<div class="viewport">
  <div class="hud-header">
    <div class="hud-title" id="modeIndicator">Mitosis (Body Cells)</div>
    <button class="hud-toggle" id="modeSwitcher">Switch Process</button>
  </div>

  <div class="canvas-core">
    <svg id="renderEngineSvg" viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
      
      <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
          <feGaussianBlur stdDeviation="6" result="blur" />
          <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
      </defs>

      <g id="spindleSystem" opacity="0">
        <path id="spindlesLeft" d="M160 250 L380 180 M160 250 L400 250 M160 250 L380 320" stroke="var(--spindle-color)" stroke-width="1" opacity="0.25"/>
        <path id="spindlesRight" d="M640 250 L420 180 M640 250 L400 250 M640 250 L420 320" stroke="var(--spindle-color)" stroke-width="1" opacity="0.25"/>
        <circle cx="160" cy="250" r="5" fill="var(--spindle-color)" filter="url(#glow)"/>
        <circle cx="640" cy="250" r="5" fill="var(--spindle-color)" filter="url(#glow)"/>
      </g>

      <g id="membraneSystem">
        <path id="membraneA" d="M 400,250 m -130,0 a 130,130 0 1,0 260,0 a 130,130 0 1,0 -260,0" fill="var(--membrane-fill)" stroke="var(--membrane-stroke)" stroke-width="4.5"/>
        <path id="membraneB" d="M 400,250 m -130,0 a 130,130 0 1,0 260,0 a 130,130 0 1,0 -260,0" fill="var(--membrane-fill)" stroke="var(--membrane-stroke)" stroke-width="4.5" opacity="0"/>
        
        <circle id="subM1" cx="240" cy="140" r="0" fill="var(--membrane-fill)" stroke="var(--membrane-stroke)" stroke-width="3.5" opacity="0"/>
        <circle id="subM2" cx="240" cy="360" r="0" fill="var(--membrane-fill)" stroke="var(--membrane-stroke)" stroke-width="3.5" opacity="0"/>
        <circle id="subM3" cx="560" cy="140" r="0" fill="var(--membrane-fill)" stroke="var(--membrane-stroke)" stroke-width="3.5" opacity="0"/>
        <circle id="subM4" cx="560" cy="360" r="0" fill="var(--membrane-fill)" stroke="var(--membrane-stroke)" stroke-width="3.5" opacity="0"/>
      </g>

      <g id="nucleusSystem">
        <circle id="nucA" cx="400" cy="250" r="60" fill="var(--nucleus-fill)" stroke="var(--nucleus-stroke)" stroke-width="2.5"/>
        <circle id="nucB" cx="400" cy="250" r="60" fill="var(--nucleus-fill)" stroke="var(--nucleus-stroke)" stroke-width="2.5" opacity="0"/>
      </g>

      <g id="chromosomes">
        <g id="nodeA" class="chromosome-node" color="var(--ch-red)">
          <line id="nodeA_armL" x1="0" y1="-16" x2="0" y2="16" stroke="var(--ch-red)" stroke-width="6.5" stroke-linecap="round"/>
          <line id="nodeA_armR" x1="-16" y1="0" x2="16" y2="0" stroke="var(--ch-red)" stroke-width="6.5" stroke-linecap="round"/>
          <circle cx="0" cy="0" r="5.5" fill="#fff"/>
        </g>
        <g id="nodeB" class="chromosome-node" color="var(--ch-blue)">
          <line id="nodeB_armL" x1="0" y1="-16" x2="0" y2="16" stroke="var(--ch-blue)" stroke-width="6.5" stroke-linecap="round"/>
          <line id="nodeB_armR" x1="-16" y1="0" x2="16" y2="0" stroke="var(--ch-blue)" stroke-width="6.5" stroke-linecap="round"/>
          <circle cx="0" cy="0" r="5.5" fill="#fff"/>
        </g>
        
        <g id="splitA" opacity="0" class="chromosome-node" color="var(--ch-red)"><line x1="-16" y1="0" x2="16" y2="0" stroke="var(--ch-red)" stroke-width="6.5" stroke-linecap="round"/><circle cx="0" cy="0" r="5.5" fill="#fff"/></g>
        <g id="splitB" opacity="0" class="chromosome-node" color="var(--ch-blue)"><line x1="-16" y1="0" x2="16" y2="0" stroke="var(--ch-blue)" stroke-width="6.5" stroke-linecap="round"/><circle cx="0" cy="0" r="5.5" fill="#fff"/></g>
        <g id="splitC" opacity="0" class="chromosome-node" color="var(--ch-purple)"><line x1="-16" y1="0" x2="16" y2="0" stroke="var(--ch-purple)" stroke-width="6.5" stroke-linecap="round"/><circle cx="0" cy="0" r="5.5" fill="#fff"/></g>
        <g id="splitD" opacity="0" class="chromosome-node" color="var(--ch-red)"><line x1="-16" y1="0" x2="16" y2="0" stroke="var(--ch-red)" stroke-width="6.5" stroke-linecap="round"/><circle cx="0" cy="0" r="5.5" fill="#fff"/></g>
      </g>
    </svg>
  </div>

  <div class="hud-footer">
    <h2 class="step-heading" id="titleField">Interphase</h2>
    <p class="step-details" id="descField">The cell undergoes normal metabolic activities, safe within its dynamic nuclear wall.</p>
    <div class="interaction-tip">Press <b>← Left Arrow</b> or <b>→ Right Arrow</b> to step simulation</div>
  </div>
</div>

<script>
(function(){
  const mitosisData = [
    { title: "1. Resting Stage", desc: "The cell performs its normal everyday duties. The genetic blueprint code is loose and protected securely inside the nucleus." },
    { title: "2. Copying the Blueprint", desc: "Before dividing, the cell makes a perfect, exact duplicate of its complete DNA strands so both new cells will match." },
    { title: "3. Chromosomes Wind Up", desc: "The loose DNA copies pack tightly into distinct, visible X-shapes. The helper spindle fibers start anchoring at the poles." },
    { title: "4. Equator Target Lock", desc: "The nuclear boundary dissolves. Spindle fibers reel the X-shaped chromosomes into a strict single-file line down the center." },
    { title: "5. Anaphase Snap & Pull", desc: "The center connection breaks! The chromosomes are split in half and reeled backward toward opposite ends of the cell." },
    { title: "6. Fluid Cleavage Pinching", desc: "The outer membrane stretches out and begins pinching deeply inward down the middle to separate the two floating zones." },
    { title: "7. Daughter Twin Formation", desc: "The split seals shut completely! Two individual, identical twin cells now exist, each with a perfect copy of the original DNA." }
  ];

  const meiosisData = [
    { title: "1. Reproductive Setup", desc: "A specialized cell readies itself to make reproductive gametes, replicating its core DNA code identical to mitosis." },
    { title: "2. The Trait Swap (Crossover)", desc: "Matching chromosome pairs align touching side-by-side and trade physical pieces. This creates a completely unique shuffling of traits!" },
    { title: "3. Double File Rows", desc: "Instead of one single line, the paired chromosome complexes align side-by-side in two parallel rows along the center equator." },
    { title: "4. Homologous Separation", desc: "Spindle lines pull whole, intact X-shaped structures to opposite poles, but the individual arms stay attached." },
    { title: "5. Meiosis I First Split", desc: "The structure cuts in half down the center, creating two temporary cell bodies with completely unique chromosome varieties." },
    { title: "6. Secondary Arm Fracture", desc: "Inside both cells, the chromosomes align once more. This time, their individual arms break apart and travel to opposite poles." },
    { title: "7. Four Unique Cells Complete", desc: "The cells divide one final time, resulting in four totally individual cells, each containing exactly half the normal genetic count." }
  ];

  let currentMode = 'mitosis';
  let dynamicSteps = mitosisData;
  let cursor = 0;

  const modeIndicator = document.getElementById('modeIndicator');
  const modeSwitcher = document.getElementById('modeSwitcher');
  const titleField = document.getElementById('titleField');
  const descField = document.getElementById('descField');

  // Node Framework Mapping
  const mA = document.getElementById('membraneA');
  const mB = document.getElementById('membraneB');
  const nucA = document.getElementById('nucA');
  const nucB = document.getElementById('nucB');
  const spindleLayer = document.getElementById('spindleSystem');
  
  const nodeA = document.getElementById('nodeA');
  const nodeA_armR = document.getElementById('nodeA_armR');
  const nodeB = document.getElementById('nodeB');
  const nodeB_armR = document.getElementById('nodeB_armR');
  
  const sA = document.getElementById('splitA');
  const sB = document.getElementById('splitB');
  const sC = document.getElementById('splitC');
  const sD = document.getElementById('splitD');

  const subM1 = document.getElementById('subM1');
  const subM2 = document.getElementById('subM2');
  const subM3 = document.getElementById('subM3');
  const subM4 = document.getElementById('subM4');

  function updateGraphicsPipeline() {
    titleField.textContent = dynamicSteps[cursor].title;
    descField.textContent = dynamicSteps[cursor].desc;

    // Reset baseline properties for all layers smoothly
    nodeA.style.opacity = 1; nodeB.style.opacity = 1;
    nodeA_armR.style.opacity = 1; nodeB_armR.style.opacity = 1;
    sA.style.opacity = 0; sB.style.opacity = 0; sC.style.opacity = 0; sD.style.opacity = 0;
    subM1.style.opacity = 0; subM2.style.opacity = 0; subM3.style.opacity = 0; subM4.style.opacity = 0;
    subM1.setAttribute('r', 0); subM2.setAttribute('r', 0); subM3.setAttribute('r', 0); subM4.setAttribute('r', 0);

    if (currentMode === 'mitosis') {
      mitosisTimelineLoop();
    } else {
      meiosisTimelineLoop();
    }
  }

  function mitosisTimelineLoop() {
    if (cursor === 0) {
      mA.setAttribute('d', "M 400,250 m -130,0 a 130,130 0 1,0 260,0 a 130,130 0 1,0 -260,0");
      mB.style.opacity = 0; nucA.style.opacity = 1; nucB.style.opacity = 0; spindleLayer.style.opacity = 0;
      nucA.setAttribute('cx', 400); nucA.setAttribute('cy', 250); nucA.setAttribute('r', 60);
      nodeA.setAttribute('transform', 'translate(380, 235) rotate(15) scale(0.6)');
      nodeB.setAttribute('transform', 'translate(415, 260) rotate(-40) scale(0.6)');
    } 
    else if (cursor === 1) {
      nucA.setAttribute('r', 72); // Growth pulse
      nodeA.setAttribute('transform', 'translate(370, 230) rotate(40) scale(1.1)');
      nodeB.setAttribute('transform', 'translate(425, 265) rotate(-15) scale(1.1)');
    }
    else if (cursor === 2) {
      nucA.setAttribute('r', 60); nucA.style.opacity = 1; spindleLayer.style.opacity = 0;
      nodeA.setAttribute('transform', 'translate(375, 225) rotate(65) scale(1.35)');
      nodeB.setAttribute('transform', 'translate(420, 270) rotate(-55) scale(1.35)');
    }
    else if (cursor === 3) {
      nucA.style.opacity = 0; spindleLayer.style.opacity = 1;
      mA.setAttribute('d', "M 400,250 m -150,0 a 150,115 0 1,0 300,0 a 150,115 0 1,0 -300,0");
      nodeA.setAttribute('transform', 'translate(400, 185) rotate(90) scale(1.35)');
      nodeB.setAttribute('transform', 'translate(400, 315) rotate(90) scale(1.35)');
    }
    else if (cursor === 4) {
      spindleLayer.style.opacity = 1;
      nodeA_armR.style.opacity = 0; nodeB_armR.style.opacity = 0; // Snap X into single arms
      nodeA.setAttribute('transform', 'translate(225, 185) rotate(40) scale(1.35)');
      nodeB.setAttribute('transform', 'translate(225, 315) rotate(40) scale(1.35)');
      
      sA.setAttribute('transform', 'translate(575, 185) rotate(-40) scale(1.35)');
      sB.setAttribute('transform', 'translate(575, 315) rotate(-40) scale(1.35)');
      sA.style.opacity = 1; sB.style.opacity = 1;
    }
    else if (cursor === 5) {
      spindleLayer.style.opacity = 0; nucA.style.opacity = 0; nucB.style.opacity = 0;
      // Fluid dynamic path morphing for organic pinching effect
      mA.setAttribute('d', "M 220,250 C 220,130 350,175 350,250 C 350,325 220,370 220,250 Z");
      mB.setAttribute('d', "M 580,250 C 580,130 450,175 450,250 C 450,325 580,370 580,250 Z");
      mB.style.opacity = 1;
      
      nodeA.setAttribute('transform', 'translate(230, 230) rotate(20) scale(1)');
      nodeB.setAttribute('transform', 'translate(240, 270) rotate(-10) scale(1)');
      sA.setAttribute('transform', 'translate(560, 230) rotate(15) scale(1)');
      sB.setAttribute('transform', 'translate(570, 270) rotate(-35) scale(1)');
      sA.style.opacity = 1; sB.style.opacity = 1;
    }
    else if (cursor === 6) {
      mA.setAttribute('d', "M 230,250 m -105,0 a 105,105 0 1,0 210,0 a 105,105 0 1,0 -210,0");
      mB.setAttribute('d', "M 570,250 m -105,0 a 105,105 0 1,0 210,0 a 105,105 0 1,0 -210,0");
      nucA.style.opacity = 1; nucB.style.opacity = 1;
      nucA.setAttribute('cx', 230); nucA.setAttribute('cy', 250); nucA.setAttribute('r', 48);
      nucB.setAttribute('cx', 570); nucB.setAttribute('cy', 250); nucB.setAttribute('r', 48);
      
      nodeA.setAttribute('transform', 'translate(225, 240) rotate(10) scale(0.6)');
      nodeB.setAttribute('transform', 'translate(235, 255) rotate(-15) scale(0.6)');
      sA.setAttribute('transform', 'translate(565, 240) rotate(5) scale(0.6)');
      sB.setAttribute('transform', 'translate(575, 255) rotate(-20) scale(0.6)');
      sA.style.opacity = 1; sB.style.opacity = 1;
    }
  }

  function meiosisTimelineLoop() {
    if (cursor === 0) {
      mA.setAttribute('d', "M 400,250 m -130,0 a 130,130 0 1,0 260,0 a 130,130 0 1,0 -260,0");
      mB.style.opacity = 0; nucA.style.opacity = 1; spindleLayer.style.opacity = 0;
      nodeA.setAttribute('transform', 'translate(380, 240) rotate(15) scale(0.6)');
      nodeB.setAttribute('transform', 'translate(415, 260) rotate(-35) scale(0.6)');
    }
    else if (cursor === 1) {
      // Crossing over physical connection overlap configuration
      nodeA.setAttribute('transform', 'translate(385, 250) rotate(45) scale(1.25)');
      nodeB.setAttribute('transform', 'translate(415, 250) rotate(45) scale(1.25)');
      nodeA.style.color = "var(--ch-purple)"; // Trait swap color mutation transformation
    }
    else if (cursor === 2) {
      nucA.style.opacity = 0; spindleLayer.style.opacity = 1;
      mA.setAttribute('d', "M 400,250 m -155,0 a 155,115 0 1,0 310,0 a 155,115 0 1,0 -310,0");
      nodeA.setAttribute('transform', 'translate(365, 250) rotate(90) scale(1.3)');
      nodeB.setAttribute('transform', 'translate(435, 250) rotate(90) scale(1.3)');
    }
    else if (cursor === 3) {
      // Whole intact X chromosomes yanked to separate ends
      nodeA.setAttribute('transform', 'translate(230, 250) rotate(45) scale(1.25)');
      nodeB.setAttribute('transform', 'translate(570, 250) rotate(-45) scale(1.25)');
    }
    else if (cursor === 4) {
      // Clean split into two temporary cell housings
      mA.setAttribute('d', "M 230,250 m -100,0 a 100,100 0 1,0 200,0 a 100,100 0 1,0 -200,0");
      mB.setAttribute('d', "M 570,250 m -100,0 a 100,100 0 1,0 200,0 a 100,100 0 1,0 -200,0");
      mB.style.opacity = 1;
      nodeA.setAttribute('transform', 'translate(230, 250) rotate(90) scale(1.2)');
      nodeB.setAttribute('transform', 'translate(570, 250) rotate(90) scale(1.2)');
    }
    else if (cursor === 5) {
      // Meiosis II Fracture - Split X structures into individual arms moving up/down
      nodeA_armR.style.opacity = 0; nodeB_armR.style.opacity = 0;
      nodeA.setAttribute('transform', 'translate(230, 140) rotate(0) scale(1)');
      nodeB.setAttribute('transform', 'translate(570, 140) rotate(0) scale(1)');
      
      sA.setAttribute('transform', 'translate(230, 360) rotate(180) scale(1)');
      sB.setAttribute('transform', 'translate(570, 360) rotate(180) scale(1)');
      sA.style.color = "var(--ch-purple)";
      sA.style.opacity = 1; sB.style.opacity = 1;
    }
    else if (cursor === 6) {
      // Morph everything into 4 final standalone quadrant spheres
      mA.style.opacity = 0; mB.style.opacity = 0;
      subM1.style.opacity = 1; subM2.style.opacity = 1; subM3.style.opacity = 1; subM4.style.opacity = 1;
      subM1.setAttribute('r', 65); subM2.setAttribute('r', 65); subM3.setAttribute('r', 65); subM4.setAttribute('r', 65);
      
      nodeA.setAttribute('transform', 'translate(230, 140) rotate(45) scale(0.65)');
      sA.setAttribute('transform', 'translate(230, 360) rotate(-45) scale(0.65)');
      nodeB.setAttribute('transform', 'translate(570, 140) rotate(20) scale(0.65)');
      sB.setAttribute('transform', 'translate(570, 360) rotate(-20) scale(0.65)');
      sA.style.color = "var(--ch-purple)";
      sA.style.opacity = 1; sB.style.opacity = 1;
    }
  }

  // Event Input Routing
  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowRight' && cursor < dynamicSteps.length - 1) {
      cursor++; updateGraphicsPipeline();
    } else if (e.key === 'ArrowLeft' && cursor > 0) {
      cursor--; updateGraphicsPipeline();
    }
  });

  modeSwitcher.addEventListener('click', () => {
    nodeA.style.color = "var(--ch-red)"; // Restore default paint vector states
    if (currentMode === 'mitosis') {
      currentMode = 'meiosis'; dynamicSteps = meiosisData;
      modeIndicator.textContent = "Meiosis (Sex Cells)";
      modeSwitcher.textContent = "Switch to Mitosis";
    } else {
      currentMode = 'mitosis'; dynamicSteps = mitosisData;
      modeIndicator.textContent = "Mitosis (Body Cells)";
      modeSwitcher.textContent = "Switch to Meiosis";
    }
    cursor = 0; updateGraphicsPipeline();
  });

  // Run initial pipeline core engine launch loop
  updateGraphicsPipeline();
})();
</script>
</body>
</html>
