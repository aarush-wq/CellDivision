<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Cell Division Simulation By- Aarush Maharana</title>
<style>
  :root {
    --bg-color: #0b0f19;
    --text-primary: #f8fafc;
    --text-muted: #94a3b8;
    --accent: #38bdf8;
    --accent-glow: rgba(56, 189, 248, 0.25);
    
    /* Premium Biomorphic Color Palette */
    --membrane-stroke: #0ea5e9;
    --membrane-fill: rgba(14, 165, 233, 0.06);
    --nucleus-stroke: #0284c7;
    --nucleus-fill: rgba(2, 132, 199, 0.15);
    --spindle-color: #f59e0b;
    
    /* Chromosome Core & Glow Dynamics */
    --ch-red: #ef4444;
    --ch-blue: #3b82f6;
    --ch-purple: #a855f7;
  }

  body, html {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background-color: var(--bg-color);
    color: var(--text-primary);
    -webkit-tap-highlight-color: transparent; /* Clean tap visual on mobile */
  }

  .viewport {
    width: 100vw;
    height: 100vh;
    display: flex;
    flex-direction: column;
    position: relative;
    background: radial-gradient(circle at center, #111827 0%, #030712 100%);
  }

  /* Sleek Progress Bar Indicator for Mobile Users */
  .progress-container {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 4px;
    background: rgba(255, 255, 255, 0.05);
    z-index: 20;
  }
  
  .progress-bar {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #0ea5e9, var(--accent));
    box-shadow: 0 0 8px var(--accent);
    transition: width 0.4s ease;
  }

  /* Cinematic Minimal HUD Overlay */
  .hud-header {
    position: absolute;
    top: 4px;
    left: 0;
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px;
    box-sizing: border-box;
    z-index: 10;
    pointer-events: none;
  }

  @media (min-width: 768px) {
    .hud-header { padding: 30px 40px; }
  }

  .hud-title {
    font-size: 16px;
    font-weight: 800;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: #fff;
    text-shadow: 0 0 20px var(--accent-glow);
    pointer-events: auto;
  }

  @media (min-width: 768px) { .hud-title { font-size: 20px; } }

  .hud-toggle {
    background: rgba(15, 23, 42, 0.6);
    border: 1px solid rgba(255, 255, 255, 0.1);
    color: var(--text-primary);
    padding: 8px 16px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    border-radius: 30px;
    cursor: pointer;
    transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
    backdrop-filter: blur(12px);
    pointer-events: auto;
    box-shadow: 0 4px 30px rgba(0, 0, 0, 0.4);
  }

  @media (min-width: 768px) {
    .hud-toggle { padding: 12px 24px; font-size: 13px; }
  }

  .hud-toggle:hover {
    background: var(--text-primary);
    color: var(--bg-color);
    box-shadow: 0 0 25px rgba(255, 255, 255, 0.3);
    transform: scale(1.05);
  }

  /* Viewport Canvas Engine Container */
  .canvas-core {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    padding: 20px;
  }
