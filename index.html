<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cell Division Project - Mitosis & Meiosis</title>

<style>
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background-color: #f4f7f6;
    color: #333333;
    margin: 0;
    padding: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* Simple, human-style header */
  header {
    text-align: center;
    margin-bottom: 20px;
    border-bottom: 2px solid #cbd5e1;
    padding-bottom: 10px;
    width: 100%;
    max-width: 800px;
  }
  header h1 {
    color: #1e3a8a;
    margin: 0 0 5px 0;
    font-size: 28px;
  }
  header p {
    margin: 0;
    color: #4b5563;
    font-size: 15px;
  }

  /* Simple mode buttons */
  .mode-container {
    margin-bottom: 15px;
  }
  .mode-btn {
    background-color: #ffffff;
    border: 2px solid #1e3a8a;
    color: #1e3a8a;
    padding: 10px 20px;
    font-size: 15px;
    font-weight: bold;
    cursor: pointer;
    border-radius: 5px;
    margin: 0 5px;
    transition: all 0.2s;
  }
  .mode-btn.active {
    background-color: #1e3a8a;
    color: #ffffff;
  }

  /* Main project display window */
  .project-box {
    background-color: #ffffff;
    border: 2px solid #cbd5e1;
    border-radius: 8px;
    width: 100%;
    max-width: 800px;
    padding: 15px;
    box-shadow: 0 4px 6px rgba(0,0,0,0.05);
  }

  /* Simple timeline dots */
  .dot-row {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-bottom: 15px;
  }
  .step-dot {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background-color: #e2e8f0;
    border: 1px solid #cbd5e1;
    cursor: pointer;
  }
  .step-dot.active {
    background-color: #1e3a8a;
    border-color: #1e3a8a;
    transform: scale(1.1);
  }

  /* Animation drawing window */
  .display-window {
    background-color: #fafafa;
    border: 1px solid #e2e8f0;
    border-radius: 6px;
    aspect-ratio: 16/10;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  #cellSvg {
    width: 100%;
    height: 100%;
    max-width: 600px;
  }

  /* Simplified Text Info Area */
  .text-area {
    text-align: center;
    margin-top: 15px;
    min-height: 100px;
    padding: 0 10px;
  }
  .step-title {
    color: #1e3a8a;
    margin: 0 0 8px 0;
    font-size: 22px;
  }
  .step-text {
    color: #4b5563;
    font-size: 15px;
    line-height: 1.5;
    margin: 0;
  }

  /* Controls Row */
  .control-row {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 10px;
    margin-top: 15px;
  }
  .action-btn {
    background-color: #3b82f6;
    color: white;
    border: none;
    padding: 10px 18px;
    font-size: 14px;
    font-weight: 600;
    border-radius: 4px;
    cursor: pointer;
  }
  .action-btn:hover { background-color: #2563eb; }
  .action-btn:disabled { background-color: #cbd5e1; cursor: not-allowed; }
  
  .action-btn.secondary { background-color: #6b7280; }
  .action-btn.secondary:hover { background-color: #4b5563; }

  .speed-box {
    font-size: 14px;
    color: #4b5563;
  }
  .speed-box select {
    padding: 4px;
    border-radius: 4px;
    border: 1px solid #cbd5e1;
  }
</style>
</head>
<body>

<header>
  <h1 id="mainTitle">Cell Division Project</h1>
  <p>An interactive guide to Mitosis and Meiosis — By Aarush Maharana</p>
</header>

<div class="mode-container">
  <button class="mode-btn active" id="mitosisBtn">Mitosis (Body Cells)</button>
  <button class="mode-btn" id="meiosisBtn">Meiosis (Sex Cells)</button>
</div>

<div class="project-box">
  <div class="dot-row" id="dotRow"></div>

  <div class="display-window">
    <svg id="cellSvg" viewBox="0 0 600 420" xmlns="http://www.w3.org/2000/svg">
      <g id="parentGroup">
        <circle id="parentMembrane" cx="300" cy="220" r="100" fill="#e0f2fe" stroke="#0284c7" stroke-width="4"></circle>
        <circle id="parentNucleus" cx="300" cy="220" r="45" fill="#bae6fd" stroke="#0369a1" stroke-width="2"></circle>
        <g id="parentChromos" opacity="0"></g>
      </g>

      <g id="divideGroup" opacity="0">
        <ellipse id="divideMembrane" cx="300" cy="220" rx="160" ry="100" fill="#e0f2fe" stroke="#0284c7" stroke-width="4"></ellipse>
        <g id="spindleLines" stroke="#eab308" stroke-width="2" opacity="0.6"></g>
        <line id="equatorLine" x1="300" y1="120" x2="300" y2="320" stroke="#eab308" stroke-width="2" stroke-dasharray="5 5" opacity="0.6"></line>
        <g id="movingChromos"></g>
      </g>

      <g id="daughterGroup" opacity="0">
        <g id="daughterLeft">
          <circle id="dLeftMembrane" cx="220" cy="220" r="85" fill="#e0f2fe" stroke="#0284c7" stroke-width="4"></circle>
          <circle id="dLeftNucleus" cx="220" cy="220" r="40" fill="#bae6fd" stroke="#0369a1" stroke-width="2"></circle>
          <g id="leftChromos"></g>
        </g>
        <g id="daughterRight">
          <circle id="dRightMembrane" cx="380" cy="220" r="85" fill="#e0f2fe" stroke="#0284c7" stroke-width="4"></circle>
          <circle id="dRightNucleus" cx="380" cy="220" r="40" fill="#bae6fd" stroke="#0369a1" stroke-width="2"></circle>
          <g id="rightChromos"></g>
        </g>
      </g>

      <g id="quadGroup" opacity="0">
        <g transform="translate(195, 145)"><circle cx="0" cy="0" r="60" fill="#e0f2fe" stroke="#0284c7" stroke-width="3"></circle><circle cx="0" cy="0" r="25" fill="#bae6fd" stroke="#0369a1" stroke-width="1.5"></circle><g id="quad1"></g></g>
        <g transform="translate(195, 295)"><circle cx="0" cy="0" r="60" fill="#e0f2fe" stroke="#0284c7" stroke-width="3"></circle><circle cx="0" cy="0" r="25" fill="#bae6fd" stroke="#0369a1" stroke-width="1.5"></circle><g id="quad2"></g></g>
        <g transform="translate(405, 145)"><circle cx="0" cy="0" r="60" fill="#e0f2fe" stroke="#0284c7" stroke-width="3"></circle><circle cx="0" cy="0" r="25" fill="#bae6fd" stroke="#0369a1" stroke-width="1.5"></circle><g id="quad3"></g></g>
        <g transform="translate(405, 295)"><circle cx="0" cy="0" r="60" fill="#e0f2fe" stroke="#0284c7" stroke-width="3"></circle><circle cx="0" cy="0" r="25" fill="#bae6fd" stroke="#0369a1" stroke-width="1.5"></circle><g id="quad4"></g></g>
      </g>
    </svg>
  </div>

  <div class="text-area">
    <h2 class="step-title" id="stepTitle">Step Title</h2>
    <p class="step-text" id="stepText">Step explanation goes here...</p>
  </div>

  <div class="control-row">
    <button class="action-btn secondary" id="resetBtn">Restart</button>
    <button class="action-btn" id="backBtn">Back</button>
    <button class="action-btn" id="playBtn">Auto Play</button>
    <button class="action-btn" id="nextBtn">Next</button>
    
    <div class="speed-box">
      Speed:
      <select id="speedSelect">
        <option value="4000">Slow</option>
        <option value="2500" selected>Normal</option>
      </select>
    </div>
  </div>
</div>

<script>
(function(){
  // Simplified explanatory text written in student-friendly terms
  const mitosisSteps = [
    { title: "1. Normal Resting Stage", desc: "The cell is growing and doing its normal everyday job. The DNA is loose and hidden safely inside the nucleus." },
    { title: "2. Copying the DNA", desc: "Before dividing, the cell makes a perfect copy of all its DNA so that both new cells will have a complete set." },
    { title: "3. Chromosomes Form", desc: "The loose DNA packs tightly into X-shaped structures called chromosomes. You can now clearly see them inside the nucleus." },
    { title: "4. Lining Up in the Middle", desc: "The nucleus wall melts away. The chromosomes line up perfectly in a single-file line right down the center of the cell." },
    { title: "5. Pulling Apart", desc: "The X-shaped chromosomes are snapped in half. Strong cell fibers pull the pieces away to opposite sides of the cell." },
    { title: "6. Pinching the Cell", desc: "The middle of the cell begins to pinch inward, separating the floating pieces and preparing to split down the center." },
    { title: "7. Two Twin Cells", desc: "The split is complete! We now have two separate cells. They are identical twins with the exact same DNA as the parent cell." }
  ];

  const meiosisSteps = [
    { title: "1. Resting Stage", desc: "A special cell prepares to divide to make reproductive cells. It copies its DNA just like in mitosis." },
    { title: "2. Trading DNA Pieces", desc: "Similar chromosomes pair up side-by-side and trade random pieces with each other. This creates a totally unique mix of traits!" },
    { title: "3. Lining Up in Rows", desc: "Instead of a single line, the paired chromosomes line up in two rows down the middle of the cell." },
    { title: "4. First Big Pull", desc: "Whole chromosome pairs are pulled apart to opposite ends of the cell, but the individual arms stay stuck together." },
    { title: "5. First Split", desc: "The cell pinches in half. We now have two temporary cells, each holding half the amount of original chromosome pairs." },
    { title: "6. Second Pull Apart", desc: "Inside both cells, the chromosomes line up again. This time, the individual arms are snapped and pulled apart." },
    { title: "7. Four Unique Cells", desc: "The cells split once more, creating four final cells. Each has a completely unique mix of DNA and only half the normal amount of genetic material." }
  ];

  let currentMode = 'mitosis';
  let stepsList = mitosisSteps;
  let currentStep = 0;
  let timer = null;

  const svgNS = "http://www.w3.org/2000/svg";

  // Elements
  const dotRow = document.getElementById('dotRow');
  const stepTitle = document.getElementById('stepTitle');
  const stepText = document.getElementById('stepText');
  const backBtn = document.getElementById('backBtn');
  const nextBtn = document.getElementById('nextBtn');
  const playBtn = document.getElementById('playBtn');
  const resetBtn = document.getElementById('resetBtn');
  const speedSelect = document.getElementById('speedSelect');
  const mitosisBtn = document.getElementById('mitosisBtn');
  const meiosisBtn = document.getElementById('meiosisBtn');
  const mainTitle = document.getElementById('mainTitle');

  // SVG Layers
  const parentGroup = document.getElementById('parentGroup');
  const parentMembrane = document.getElementById('parentMembrane');
  const parentNucleus = document.getElementById('parentNucleus');
  const parentChromos = document.getElementById('parentChromos');
  const divideGroup = document.getElementById('divideGroup');
  const divideMembrane = document.getElementById('divideMembrane');
  const spindleLines = document.getElementById('spindleLines');
  const equatorLine = document.getElementById('equatorLine');
  const movingChromos = document.getElementById('movingChromos');
  const daughterGroup = document.getElementById('daughterGroup');
  const leftChromos = document.getElementById('leftChromos');
  const rightChromos = document.getElementById('rightChromos');
  const quadGroup = document.getElementById('quadGroup');

  function makeChromo(x, y, mainColor, darkColor, scale=1.2, rotation=0, crossed=false) {
    const g = document.createElementNS(svgNS, "g");
    g.setAttribute("transform", `translate(${x},${y}) rotate(${rotation}) scale(${scale})`);
    
    const arm1 = document.createElementNS(svgNS, "line");
    arm1.setAttribute("x1", "-6"); arm1.setAttribute("y1", "-10");
    arm1.setAttribute("x2", "6"); arm1.setAttribute("y2", "10");
    arm1.setAttribute("stroke", crossed ? "#a855f7" : darkColor);
    arm1.setAttribute("stroke-width", "4"); arm1.setAttribute("stroke-linecap", "round");
    
    const arm2 = document.createElementNS(svgNS, "line");
    arm2.setAttribute("x1", "6"); arm2.setAttribute("y1", "-10");
    arm2.setAttribute("x2", "-6"); arm2.setAttribute("y2", "10");
    arm2.setAttribute("stroke", darkColor);
    arm2.setAttribute("stroke-width", "4"); arm2.setAttribute("stroke-linecap", "round");

    const center = document.createElementNS(svgNS, "circle");
    center.setAttribute("cx", "0"); center.setAttribute("cy", "0"); center.setAttribute("r", "4");
    center.setAttribute("fill", mainColor);

    g.appendChild(arm1); g.appendChild(arm2); g.appendChild(center);
    return g;
  }

  function makeSingleArm(x, y, darkColor, rotation=0) {
    const g = document.createElementNS(svgNS, "g");
    g.setAttribute("transform", `translate(${x},${y}) rotate(${rotation})`);
    const line = document.createElementNS(svgNS, "line");
    line.setAttribute("x1", "-5"); line.setAttribute("y1", "-10");
    line.setAttribute("x2", "5"); line.setAttribute("y2", "10");
    line.setAttribute("stroke", darkColor);
    line.setAttribute("stroke-width", "4"); line.setAttribute("stroke-linecap", "round");
    g.appendChild(line);
    return g;
  }

  function buildDots() {
    dotRow.innerHTML = '';
    stepsList.forEach((_, i) => {
      const dot = document.createElement('div');
      dot.className = 'step-dot';
      dot.addEventListener('click', () => { stopAuto(); goToStep(i); });
      dotRow.appendChild(dot);
    });
  }

  function updateUI() {
    const dots = document.querySelectorAll('.step-dot');
    dots.forEach((dot, i) => dot.classList.toggle('active', i === currentStep));
    
    stepTitle.textContent = stepsList[currentStep].title;
    stepText.textContent = stepsList[currentStep].desc;

    backBtn.disabled = (currentStep === 0);
    nextBtn.disabled = (currentStep === stepsList.length - 1);

    // Reset everything hidden
    parentGroup.style.opacity = 0;
    divideGroup.style.opacity = 0;
    daughterGroup.style.opacity = 0;
    quadGroup.style.opacity = 0;
    parentChromos.innerHTML = '';
    movingChromos.innerHTML = '';
    spindleLines.innerHTML = '';
    leftChromos.innerHTML = '';
    rightChromos.innerHTML = '';
    document.getElementById('quad1').innerHTML = '';
    document.getElementById('quad2').innerHTML = '';
    document.getElementById('quad3').innerHTML = '';
    document.getElementById('quad4').innerHTML = '';
    divideMembrane.setAttribute('rx', 160);
    divideMembrane.setAttribute('ry', 100);
    equatorLine.style.opacity = 0;

    if (currentMode === 'mitosis') {
      drawMitosis();
    } else {
      drawMeiosis();
    }
  }

  function drawMitosis() {
    if (currentStep <= 2) {
      parentGroup.style.opacity = 1;
      if (currentStep === 2) {
        parentChromos.appendChild(makeChromo(285, 205, "#ef4444", "#b91c1c", 1.2, 15));
        parentChromos.appendChild(makeChromo(315, 235, "#3b82f6", "#1d4ed8", 1.2, -30));
      }
    } else if (currentStep === 3) {
      divideGroup.style.opacity = 1;
      equatorLine.style.opacity = 0.6;
      movingChromos.appendChild(makeChromo(300, 180, "#ef4444", "#b91c1c", 1.2, 90));
      movingChromos.appendChild(makeChromo(300, 260, "#3b82f6", "#1d4ed8", 1.2, 90));
    } else if (currentStep === 4) {
      divideGroup.style.opacity = 1;
      movingChromos.appendChild(makeSingleArm(200, 180, "#b91c1c", -45));
      movingChromos.appendChild(makeSingleArm(400, 180, "#b91c1c", 45));
      movingChromos.appendChild(makeSingleArm(200, 260, "#1d4ed8", -45));
      movingChromos.appendChild(makeSingleArm(400, 260, "#1d4ed8", 45));
    } else if (currentStep === 5) {
      divideGroup.style.opacity = 1;
      divideMembrane.setAttribute('rx', 110);
      divideMembrane.setAttribute('ry', 95);
      movingChromos.appendChild(makeSingleArm(180, 200, "#b91c1c", 10));
      movingChromos.appendChild(makeSingleArm(420, 200, "#b91c1c", -10));
    } else if (currentStep === 6) {
      daughterGroup.style.opacity = 1;
      leftChromos.appendChild(makeSingleArm(220, 210, "#b91c1c", 15));
      rightChromos.appendChild(makeSingleArm(380, 210, "#1d4ed8", -15));
    }
  }

  function drawMeiosis() {
    if (currentStep === 0) {
      parentGroup.style.opacity = 1;
    } else if (currentStep === 1) {
      parentGroup.style.opacity = 1;
      parentChromos.appendChild(makeChromo(285, 210, "#ef4444", "#b91c1c", 1.2, 10, false));
      parentChromos.appendChild(makeChromo(315, 220, "#3b82f6", "#1d4ed8", 1.2, -10, true));
    } else if (currentStep === 2) {
      divideGroup.style.opacity = 1;
      equatorLine.style.opacity = 0.6;
      movingChromos.appendChild(makeChromo(280, 220, "#ef4444", "#b91c1c", 1.1, 90, false));
      movingChromos.appendChild(makeChromo(320, 220, "#3b82f6", "#1d4ed8", 1.1, 90, true));
    } else if (currentStep === 3) {
      divideGroup.style.opacity = 1;
      movingChromos.appendChild(makeChromo(200, 220, "#ef4444", "#b91c1c", 1.1, 45, false));
      movingChromos.appendChild(makeChromo(400, 220, "#3b82f6", "#1d4ed8", 1.1, -45, true));
    } else if (currentStep === 4) {
      daughterGroup.style.opacity = 1;
      leftChromos.appendChild(makeChromo(220, 220, "#ef4444", "#b91c1c", 1, 15, false));
      rightChromos.appendChild(makeChromo(380, 220, "#3b82f6", "#1d4ed8", 1, -15, true));
    } else if (currentStep === 5) {
      daughterGroup.style.opacity = 1;
      leftChromos.appendChild(makeSingleArm(190, 220, "#b91c1c", -30));
      leftChromos.appendChild(makeSingleArm(250, 220, "#a855f7", 30));
      rightChromos.appendChild(makeSingleArm(350, 220, "#1d4ed8", -30));
      rightChromos.appendChild(makeSingleArm(410, 220, "#b91c1c", 30));
    } else if (currentStep === 6) {
      quadGroup.style.opacity = 1;
      document.getElementById('quad1').appendChild(makeSingleArm(0, 0, "#b91c1c", 15));
      document.getElementById('quad2').appendChild(makeSingleArm(0, 0, "#a855f7", -15));
      document.getElementById('quad3').appendChild(makeSingleArm(0, 0, "#1d4ed8", 45));
      document.getElementById('quad4').appendChild(makeSingleArm(0, 0, "#b91c1c", -45));
    }
  }

  function goToStep(idx) {
    currentStep = idx;
    updateUI();
  }

  function stopAuto() {
    if(timer) { clearInterval(timer); timer = null; }
    playBtn.textContent = "Auto Play";
  }

  // Click Actions
  nextBtn.addEventListener('click', () => { stopAuto(); if(currentStep < stepsList.length - 1) goToStep(currentStep + 1); });
  backBtn.addEventListener('click', () => { stopAuto(); if(currentStep > 0) goToStep(currentStep - 1); });
  resetBtn.addEventListener('click', () => { stopAuto(); goToStep(0); });
  
  playBtn.addEventListener('click', () => {
    if(timer) {
      stopAuto();
    } else {
      playBtn.textContent = "Pause";
      if(currentStep === stepsList.length - 1) currentStep = 0;
      goToStep(currentStep);
      timer = setInterval(() => {
        if(currentStep < stepsList.length - 1) {
          goToStep(currentStep + 1);
        } else {
          stopAuto();
        }
      }, parseInt(speedSelect.value));
    }
  });

  mitosisBtn.addEventListener('click', () => {
    if(currentMode === 'mitosis') return;
    currentMode = 'mitosis';
    stepsList = mitosisSteps;
    mitosisBtn.classList.add('active');
    meiosisBtn.classList.remove('active');
    mainTitle.textContent = "Cell Division Project - Mitosis";
    stopAuto();
    buildDots();
    goToStep(0);
  });

  meiosisBtn.addEventListener('click', () => {
    if(currentMode === 'meiosis') return;
    currentMode = 'meiosis';
    stepsList = meiosisSteps;
    meiosisBtn.classList.add('active');
    mitosisBtn.classList.remove('active');
    mainTitle.textContent = "Cell Division Project - Meiosis";
    stopAuto();
    buildDots();
    goToStep(0);
  });

  // Startup Setup
  buildDots();
  goToStep(0);
})();
</script>

</body>
</html>
